<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Approval</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        img {
            width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }
        .caption {
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
            padding: 16px;
            border-radius: 4px;
            white-space: pre-wrap;
            margin: 16px 0;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        button {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .approve { background: #4CAF50; color: white; }
        .edit { background: #2196F3; color: white; }
        .reject { background: #f44336; color: white; }
        button:hover { opacity: 0.85; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            display: none;
            margin-top: 16px;
            box-sizing: border-box;
        }
        .save { background: #FF9800; color: white; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧱 Lego News Bot — Post Approval</h1>
        <h3>{{ post_title }}</h3>
        <img src="/image" alt="Generated image">
        <h3>Caption</h3>
        <div class="caption" id="caption-display">{{ caption }}</div>
        <textarea id="caption-edit">{{ caption }}</textarea>
        <div class="buttons">
            <button class="approve" onclick="approve()">✅ Approve</button>
            <button class="edit" onclick="toggleEdit()">✏️ Edit</button>
            <button class="reject" onclick="reject()">❌ Reject</button>
            <button class="save" id="save-btn" onclick="saveEdit()">💾 Save Edit</button>
        </div>
    </div>

    <script>
        function approve() {
            const caption = document.getElementById('caption-edit').value;
            fetch('/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({caption: caption})
            }).then(r => r.json()).then(data => {
                alert(data.message);
            });
        }

        function toggleEdit() {
            const textarea = document.getElementById('caption-edit');
            const display = document.getElementById('caption-display');
            const saveBtn = document.getElementById('save-btn');
            textarea.style.display = textarea.style.display === 'none' ? 'block' : 'none';
            display.style.display = display.style.display === 'none' ? 'block' : 'none';
            saveBtn.style.display = saveBtn.style.display === 'none' ? 'block' : 'none';
        }

        function saveEdit() {
            const textarea = document.getElementById('caption-edit');
            const display = document.getElementById('caption-display');
            const saveBtn = document.getElementById('save-btn');
            display.textContent = textarea.value;
            textarea.style.display = 'none';
            display.style.display = 'block';
            saveBtn.style.display = 'none';
        }

        function reject() {
            if(confirm('Are you sure you want to reject this post?')) {
                fetch('/reject', {method: 'POST'})
                .then(r => r.json())
                .then(data => alert(data.message));
            }
        }
    </script>
</body>
</html>
